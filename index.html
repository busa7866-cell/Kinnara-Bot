<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINNARA Premium UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-primary: #FFD700;
            --gold-secondary: #F6A942;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --bg-dark: #0a0a0a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .my-text { font-family: 'Padauk', sans-serif; line-height: 1.6; }

        /* 5. Background Brightened Slightly */
        body {
            background: linear-gradient(rgba(15, 15, 15, 0.7), rgba(15, 15, 15, 0.8)), 
                        url('https://i.ibb.co/pjW63yYP/c-HJpdm-F0-ZS9sci9pb-WFn-ZXMvd2-Vic2l0-ZS8y-MDI0-LTAy-L3-Jhd3-Bpe-GVs-X29m-Zmlj-ZV8y-Ml8z-ZF9y-ZW5k-ZXJfb2.jpg') center/cover fixed;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            padding-top: 25px;
            position: relative;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .header-content { display: flex; align-items: center; gap: 12px; }

        .pfp-logo {
            width: 55px;
            height: 55px;
            border-radius: 14px; 
            object-fit: cover;
            border: 2px solid var(--gold-glow);
            box-shadow: 0 4px 12px var(--gold-glow);
        }

        .main-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFF6B7 0%, #F6A942 50%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 10px rgba(255, 215, 0, 0.2);
        }

        .header-actions { display: flex; align-items: center; gap: 8px; }

        .ripple-btn {
            position: relative;
            overflow: hidden; 
            cursor: pointer;
            border-radius: inherit; 
            transform: translateZ(0); /* Hardware Acceleration for smoothness */
        }

        .lang-switch {
            font-size: 12px;
            color: #888;
            font-weight: 700;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 3px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .lang-btn {
            padding: 5px 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .lang-btn.active { background: rgba(255, 215, 0, 0.15); color: var(--gold-primary); }

        /* 2. Original Gold Line Restored */
        .gold-line {
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), var(--gold-secondary), var(--gold-primary), transparent);
            margin: 15px auto 5px auto;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* --- Main Content Area --- */
        .content { 
            flex: 1; 
            padding: 15px 20px;
            overflow-y: auto;
            padding-bottom: 100px; 
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }

        /* Smoother Page Transition */
        .page-section { 
            display: none; 
            animation: fadeIn 0.25s ease-out forwards; 
            opacity: 0;
        }
        .page-section.active-page { display: block; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* --- 6. MINI Filters (Sleek & Small) --- */
        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0 15px 0;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        .filter-btn {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #ccc;
            border-radius: 12px; 
            padding: 6px 12px; /* Made it Mini */
            font-size: 11px; /* Smaller font */
            font-weight: 600;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s ease;
        }
        .filter-btn.active-filter {
            background: rgba(255, 215, 0, 0.2);
            border-color: var(--gold-primary);
            color: var(--gold-primary);
        }

        .dropdown-panel {
            display: none;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            animation: slideDown 0.2s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .dropdown-item {
            padding: 10px 12px;
            font-size: 13px;
            border-radius: 10px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.03);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* --- UI Elements --- */
        .glass-card {
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 20px;
            padding: 20px;
            margin-top: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #F6A942, #FFD700);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.25);
        }

        /* --- Trade System --- */
        .trade-container {
            display: flex; justify-content: space-between; align-items: center; margin-top: 15px; gap: 10px;
        }
        .trade-box {
            flex: 1; aspect-ratio: 1; background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(246, 169, 66, 0.5); border-radius: 16px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #888; font-size: 13px; transition: all 0.2s;
        }
        .trade-box i { font-size: 28px; color: #F6A942; margin-bottom: 8px; }
        .trade-icon-center { font-size: 20px; color: var(--gold-primary); padding: 8px; background: rgba(255,215,0,0.1); border-radius: 50%; }

        /* --- Profile Section --- */
        .profile-header {
            display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 20px;
        }
        .profile-avatar {
            width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--gold-primary);
            object-fit: cover; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); margin-bottom: 12px;
            background: #222; display: flex; align-items: center; justify-content: center;
        }
        .profile-balance-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(246,169,66,0.03));
            border: 1px solid var(--gold-glow); border-radius: 16px; padding: 20px; width: 100%; text-align: center;
            margin-top: 15px;
        }

        /* --- Navigation --- */
        .nav-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 65px; 
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); 
            border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.2);
            display: flex; justify-content: space-between; align-items: center; padding: 0 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 1000;
        }

        .nav-indicator {
            position: absolute; top: 50%; transform: translateY(-50%); 
            width: calc(100% / 4 - 10px); height: 50px;
            background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3); 
            border-radius: 16px; transition: left 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .nav-item { 
            position: relative; z-index: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; width: 25%; height: 100%; 
            color: #666; cursor: pointer; border-radius: 16px; transition: color 0.2s;
        }
        .nav-item.active { color: var(--gold-primary); text-shadow: 0 0 8px rgba(255, 215, 0, 0.4); }
        .nav-item i { font-size: 18px; margin-bottom: 4px; transition: transform 0.2s; }
        .nav-item.active i { transform: translateY(-2px) scale(1.1); }
        .nav-text { font-size: 9px; font-weight: 700; text-transform: uppercase; }

        /* The Pure Circle Ripple Effect (Fast & Smooth) */
        .ripple {
            position: absolute;
            background: rgba(255, 215, 0, 0.25);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-anim 0.4s ease-out; /* Faster animation */
            pointer-events: none;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* --- 1. MOBILE SIZE FIXES --- */
        @media (max-width: 480px) {
            .header-top { padding: 0 15px; }
            .pfp-logo { width: 45px; height: 45px; border-radius: 10px; }
            .main-title { font-size: 20px; }
            .content { padding: 10px 15px; }
            .nav-container { width: 92%; height: 60px; bottom: 15px; }
            .nav-indicator { height: 45px; }
        }
    </style>
</head>
<body>

    <header id="main-header" class="header">
        <div class="header-top">
            <div class="header-content">
                <img src="https://i.ibb.co/PsMwstKZ/IMG-20260326-211528-073.jpg" class="pfp-logo">
                <h1 class="main-title" data-i18n="kinnara">KINNARA</h1>
            </div>
            
            <div class="header-actions">
                <div id="ton-connect-button" style="transform: scale(0.85); transform-origin: right center;"></div>
                <div class="lang-switch ripple-btn">
                    <span id="btn-en" class="lang-btn active" onclick="setLanguage('en', event)">Eng</span> 
                    <span id="btn-my" class="lang-btn" onclick="setLanguage('my', event)">မြန်မာ</span>
                </div>
            </div>
        </div>
        <div class="gold-line"></div>
    </header>

    <main class="content">
        
        <div id="store-page" class="page-section active-page">
            <div style="text-align: center; margin-top: 50px; color: #555;">
                <i class="fa-solid fa-box-open" style="font-size: 45px; margin-bottom: 10px; color: var(--gold-primary); opacity: 0.5;"></i>
                <h3 data-i18n="store_soon" style="font-size: 16px;">Store is empty</h3>
            </div>
        </div>

        <div id="home-page" class="page-section">
            <div class="filter-bar">
                <div class="filter-btn ripple-btn" onclick="toggleDropdown('nft-panel', this, event)"><span data-i18n="nft">NFT</span> <i class="fa-solid fa-chevron-down"></i></div>
                <div class="filter-btn ripple-btn" onclick="toggleDropdown('model-panel', this, event)"><span data-i18n="model">Model</span> <i class="fa-solid fa-chevron-down"></i></div>
                <div class="filter-btn ripple-btn" onclick="toggleDropdown('backdrop-panel', this, event)"><span data-i18n="backdrop">Backdrop</span> <i class="fa-solid fa-chevron-down"></i></div>
                <div class="filter-btn ripple-btn" onclick="toggleDropdown('symbol-panel', this, event)"><span data-i18n="symbol">Symbol</span> <i class="fa-solid fa-chevron-down"></i></div>
                <div class="filter-btn ripple-btn" onclick="toggleDropdown('price-panel', this, event)"><span data-i18n="price">Price</span> <i class="fa-solid fa-chevron-down"></i></div>
            </div>

            <div id="nft-panel" class="dropdown-panel">
                <div class="dropdown-item ripple-btn"><span>🐍 <span data-i18n="snake">Snake</span></span></div>
                <div class="dropdown-item ripple-btn"><span>🍰 <span data-i18n="cake">Cake</span></span></div>
            </div>
            <div id="model-panel" class="dropdown-panel">
                <div class="dropdown-item ripple-btn"><span>⚫ <span data-i18n="black">Black</span></span></div>
                <div class="dropdown-item ripple-btn"><span>🟣 <span data-i18n="purple">Purple</span></span></div>
            </div>
        </div>

        <div id="trade-page" class="page-section">
            <h3 style="color: #F6A942; text-align: center; font-weight: 800; margin-bottom: 5px; font-size: 18px;" data-i18n="trade_title">Secure P2P Trade</h3>
            <p style="text-align: center; color: #aaa; font-size: 12px;" data-i18n="trade_desc">Select items to swap securely.</p>
            
            <div class="trade-container">
                <div class="trade-box ripple-btn" onclick="createRipple(event)">
                    <i class="fa-solid fa-plus"></i>
                    <span data-i18n="your_nft">Your NFT</span>
                </div>
                <div class="trade-icon-center"><i class="fa-solid fa-right-left"></i></div>
                <div class="trade-box ripple-btn" onclick="createRipple(event)">
                    <i class="fa-solid fa-plus"></i>
                    <span data-i18n="target_nft">Target NFT</span>
                </div>
            </div>

            <button class="btn-primary ripple-btn" style="background: rgba(246, 169, 66, 0.15); color: #F6A942; border: 1px solid #F6A942; margin-top: 20px;" onclick="createRipple(event)" data-i18n="init_trade">Initialize Trade</button>
        </div>

        <div id="profile-page" class="page-section">
            <div class="profile-header">
                <img id="tg-profile-pic" src="https://i.ibb.co/KV0Gkzy/default-avatar.png" class="profile-avatar" alt="Profile">
                <h2 id="tg-username" style="color: #fff; font-size: 18px;">@GuestUser</h2>
                
                <button id="tg-login-btn" class="btn-primary ripple-btn" style="background: #2AABEE; color: white; width: auto; padding: 8px 15px; font-size: 12px; border-radius: 20px; margin-top: 10px;" onclick="connectTelegram(event)">
                    <i class="fa-brands fa-telegram"></i> <span data-i18n="connect_tg">Connect with Telegram</span>
                </button>
            </div>

            <div class="profile-balance-card">
                <p style="color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;" data-i18n="total_balance">Total Balance</p>
                <h1 id="ton-balance-display" style="font-size: 28px; color: var(--gold-primary); margin: 8px 0; font-weight: 900;">0.00 <span style="font-size: 16px;">TON</span></h1>
                <p id="wallet-address-text" style="color: #F6A942; font-family: monospace; font-size: 11px; background: rgba(255,215,0,0.1); padding: 4px 8px; border-radius: 6px; display: inline-block;">Wallet Not Connected</p>
            </div>
            
            <button class="btn-primary ripple-btn" style="background: rgba(42, 171, 238, 0.15); color: #2AABEE; border: 1px solid #2AABEE; margin-top: 20px;" onclick="createRipple(event)">
                <i class="fa-brands fa-telegram"></i> <span data-i18n="support">Contact Admin</span>
            </button>
        </div>

    </main>

    <div class="nav-container">
        <div class="nav-indicator" id="indicator"></div>
        
        <div class="nav-item ripple-btn active" onclick="switchPage('store', this, event)">
            <i class="fa-solid fa-box-open"></i>
            <span class="nav-text" data-i18n="store">Store Box</span>
        </div>

        <div class="nav-item ripple-btn" onclick="switchPage('home', this, event)">
            <i class="fa-solid fa-house-chimney"></i>
            <span class="nav-text" data-i18n="home">Home</span>
        </div>

        <div class="nav-item ripple-btn" onclick="switchPage('trade', this, event)">
            <i class="fa-solid fa-right-left"></i> 
            <span class="nav-text" data-i18n="trade">Trade</span>
        </div>
        
        <div class="nav-item ripple-btn" onclick="switchPage('profile', this, event)">
            <i class="fa-solid fa-circle-user"></i> 
            <span class="nav-text" data-i18n="profile">Profile</span>
        </div>
    </div>

<script>
    // --- 3. Vibration Removed. Hardware Acceleration handles smoothness. ---

    // --- 4. TonConnect Setup (Stable Manifest URL) ---
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://ton-connect.github.io/demo-dapp-with-react/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    tonConnectUI.onStatusChange(async wallet => {
        const addressText = document.getElementById('wallet-address-text');
        const balanceDisplay = document.getElementById('ton-balance-display');
        
        if (wallet) {
            const rawAddress = wallet.account.address;
            const shortAddress = rawAddress.substring(0, 4) + '...' + rawAddress.substring(rawAddress.length - 4);
            addressText.innerText = shortAddress;
            balanceDisplay.innerHTML = `...`;

            try {
                const response = await fetch(`https://testnet.toncenter.com/api/v2/getAddressBalance?address=${rawAddress}`);
                const data = await response.json();
                if(data.ok) {
                    const tonAmount = (data.result / 1000000000).toFixed(2);
                    balanceDisplay.innerHTML = `${tonAmount} <span style="font-size: 16px;">TON</span>`;
                }
            } catch (error) {
                balanceDisplay.innerHTML = `Error <span style="font-size: 16px;">TON</span>`;
            }
        } else {
            addressText.innerText = currentLang === 'en' ? "Wallet Not Connected" : "ပိုက်ဆံအိတ် မချိတ်ရသေးပါ";
            balanceDisplay.innerHTML = `0.00 <span style="font-size: 16px;">TON</span>`;
        }
    });

    // --- 4. Telegram Connect Logic ---
    function checkTelegramLogin() {
        const tgLoginBtn = document.getElementById('tg-login-btn');
        // If opened inside Telegram Mini App, auto login
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe?.user) {
            const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
            if (tgUser.photo_url) document.getElementById('tg-profile-pic').src = tgUser.photo_url;
            document.getElementById('tg-username').innerText = '@' + (tgUser.username || tgUser.first_name);
            tgLoginBtn.style.display = 'none'; // Hide button if already logged in via app
        } else {
            // Show Connect button for browser users
            tgLoginBtn.style.display = 'inline-block';
        }
    }

    // Mock function for browser connect button
    function connectTelegram(event) {
        createRipple(event);
        // Normally this would open Telegram Auth Widget
        alert("This will open Telegram Login in production.");
        document.getElementById('tg-username').innerText = '@KinnaraUser';
        document.getElementById('tg-login-btn').style.display = 'none';
    }

    // --- Page Switching ---
    function switchPage(pageId, el, event) {
        if(event) createRipple(event);

        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        updateIndicator(el);

        document.querySelectorAll('.page-section').forEach(page => page.classList.remove('active-page'));
        document.getElementById(pageId + '-page').classList.add('active-page');

        const header = document.getElementById('main-header');
        if(pageId === 'profile') {
            header.style.opacity = '0';
            setTimeout(() => header.style.display = 'none', 300);
            checkTelegramLogin(); // Check TG info when entering profile
        } else {
            header.style.display = 'block';
            setTimeout(() => header.style.opacity = '1', 10);
        }
    }

    function updateIndicator(el) {
        const indicator = document.getElementById('indicator');
        indicator.style.left = `${el.offsetLeft + 5}px`;
    }

    // --- Smooth Fast Ripple ---
    function createRipple(event) {
        const button = event.currentTarget;
        const circle = document.createElement('span');
        const diameter = Math.max(button.clientWidth, button.clientHeight);
        const radius = diameter / 2;

        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - button.getBoundingClientRect().left - radius}px`;
        circle.style.top = `${event.clientY - button.getBoundingClientRect().top - radius}px`;
        circle.classList.add('ripple');

        const existingRipple = button.querySelector('.ripple');
        if (existingRipple) existingRipple.remove();

        button.appendChild(circle);
        setTimeout(() => circle.remove(), 400); // Fast cleanup
    }

    function toggleDropdown(panelId, btnElement, event) {
        if(event) createRipple(event);
        const targetPanel = document.getElementById(panelId);
        const isOpen = targetPanel.style.display === 'block';

        document.querySelectorAll('.dropdown-panel').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));

        if (!isOpen) {
            targetPanel.style.display = 'block';
            btnElement.classList.add('active-filter');
        }
    }

    // --- Translation ---
    const dict = {
        en: {
            kinnara: "KINNARA", store: "Store Box", home: "Home", trade: "Trade", profile: "Profile",
            store_soon: "Store is empty", connect_tg: "Connect with Telegram",
            nft: "NFT", model: "Model", backdrop: "Backdrop", symbol: "Symbol", price: "Price",
            snake: "Snake", cake: "Cake", black: "Black", purple: "Purple",
            trade_title: "Secure P2P Trade", trade_desc: "Select items to swap securely.",
            your_nft: "Your NFT", target_nft: "Target NFT", init_trade: "Initialize Trade",
            total_balance: "Total Balance", support: "Contact Admin"
        },
        my: {
            kinnara: "ကိန္နရာ", store: "စတိုး", home: "ပင်မ", trade: "အရောင်း", profile: "ပရိုဖိုင်",
            store_soon: "စတိုးတွင် ပစ္စည်းမရှိသေးပါ", connect_tg: "Telegram ဖြင့် ဝင်မည်",
            nft: "NFT", model: "မော်ဒယ်", backdrop: "နောက်ခံ", symbol: "သင်္ကေတ", price: "ဈေးနှုန်း",
            snake: "မြွေ", cake: "ကိတ်မုန့်", black: "အမည်းရောင်", purple: "ခရမ်းရောင်",
            trade_title: "လုံခြုံသော အရောင်းအဝယ်", trade_desc: "လဲလှယ်လိုသော ပစ္စည်းများကို ရွေးချယ်ပါ။",
            your_nft: "သင့် NFT", target_nft: "သူ၏ NFT", init_trade: "စတင်မည်",
            total_balance: "လက်ကျန်ငွေ", support: "အက်ဒမင်ထံ ဆက်သွယ်ရန်"
        }
    };

    let currentLang = 'en';

    function setLanguage(lang, event) {
        if (currentLang === lang) return;
        currentLang = lang;

        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('btn-my').classList.toggle('active', lang === 'my');

        if(lang === 'my') document.body.classList.add('my-text');
        else document.body.classList.remove('my-text');

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (dict[lang][key]) el.innerText = dict[lang][key];
        });

        if(event) createRipple({ currentTarget: event.currentTarget.parentElement, clientX: event.clientX, clientY: event.clientY });

        if(!tonConnectUI.wallet) {
            document.getElementById('wallet-address-text').innerText = lang === 'en' ? "Wallet Not Connected" : "ပိုက်ဆံအိတ် မချိတ်ရသေးပါ";
        }
    }

    window.onload = () => {
        const activeEl = document.querySelector('.nav-item.active');
        if(activeEl) setTimeout(() => updateIndicator(activeEl), 100);
        checkTelegramLogin();
    }
</script>

</body>
